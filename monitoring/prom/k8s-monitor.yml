          volumeMounts:
            - name: config
              mountPath: /config/config.yml
              subPath: config.yml
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: dingtalk-config

