    matchLabels:
      app: blackbox-exporter
  template:
    metadata:
      labels:
        app: blackbox-exporter
    spec:
      containers:
        - name: blackbox-exporter
          image: prom/blackbox-exporter:latest
          ports:
            - containerPort: 9115
          volumeMounts:
            - name: config
              mountPath: /etc/blackbox_exporter/config.yml
              subPath: config.yml
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: blackbox-config

---
# ============================================================
# Service - Blackbox Exporter
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: blackbox-exporter
  namespace: prom
spec:
  selector:
    app: blackbox-exporter
  ports:
    - port: 9115
      targetPort: 9115

---
