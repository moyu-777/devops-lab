modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_status_codes: [200, 201, 204, 301, 302, 304, 307]
      no_follow_redirects: false
      tls_config:
        insecure_skip_verify: false
      headers:
        User-Agent: "Blackbox-Exporter/1.0"

  http_post_2xx:
    prober: http
    timeout: 5s
    http:
      method: POST
      body: '{}'

  tcp_connect:
    prober: tcp
    timeout: 5s

  dns_example:
    prober: dns
    timeout: 5s
    dns:
      query_name: "example.com"
      query_type: "A"
      transport_protocol: "udp"
      preferred_ip_protocol: "ip4"

  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: "ip4"
